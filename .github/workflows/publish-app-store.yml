# STATUS: Validated structure — awaiting Apple Developer Program enrollment approval.
# Once enrollment is approved, complete these steps and this workflow is production-ready:
#
# REMAINING GAPS (must complete before first run):
#   1. Update eas.json: replace REPLACE_WITH_APP_STORE_CONNECT_APP_ID and REPLACE_WITH_APPLE_TEAM_ID
#      (see eas.json.README.md for exact click paths in App Store Connect)
#   2. Add GitHub secrets (Settings > Secrets and variables > Actions):
#        EAS_TOKEN                           Expo access token (expo.dev > Account > Access Tokens)
#        APPLE_APP_STORE_CONNECT_API_KEY_ID  Key ID from App Store Connect > Users & Access > Integrations > App Store Connect API
#        APPLE_APP_STORE_CONNECT_ISSUER_ID   Issuer ID from same page
#        APPLE_APP_STORE_CONNECT_API_KEY     base64-encoded .p8 file (download at key creation — one time only)
#   3. Run `eas login` locally and `eas build:configure` on first run to let EAS set up signing
#   4. Manually upload first build to App Store Connect (required once to create the app record)
#
# OPTIONAL secrets (crash reporting):
#   EXPO_PUBLIC_SENTRY_DSN   SENTRY_AUTH_TOKEN   SENTRY_ORG   SENTRY_PROJECT
#
# Build strategy: EAS Build (Expo Application Services)
# - No Mac runner needed; Expo hosts macOS workers with managed certificates.
# - Cost: free tier (30 builds/month); upgrade to $19/month for unlimited/priority queue.
# - See distribution/ios-enrollment-runbook.md for full enrollment steps.
# - See eas.json.README.md for placeholder fill-in instructions.
# - Alternative (self-hosted Mac runner): see commented section at bottom of this file.

name: Publish to App Store (TestFlight)

on:
  release:
    types: [published]
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish-ios:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Check Apple prerequisites
        id: check-apple
        run: |
          if [[ -n "${{ secrets.EAS_TOKEN }}" ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Apple Developer enrollment pending — EAS_TOKEN not set. Skipping iOS build."
          fi

      # Install EAS CLI globally. Pin to a recent stable version.
      - name: Install EAS CLI
        if: steps.check-apple.outputs.proceed == 'true'
        run: npm install -g eas-cli@13

      - name: Install dependencies
        if: steps.check-apple.outputs.proceed == 'true'
        run: npm install --legacy-peer-deps

      # Bump ios.buildNumber to match github.run_number (monotonically increasing).
      # App Store Connect rejects duplicate build numbers for the same version string.
      - name: Bump ios.buildNumber in app.json
        if: steps.check-apple.outputs.proceed == 'true'
        run: |
          node -e "
            const f = 'app.json';
            const j = require('./' + f);
            j.expo.ios = j.expo.ios || {};
            j.expo.ios.buildNumber = String(${{ github.run_number }});
            require('fs').writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
          "
          echo "buildNumber now: $(node -p "require('./app.json').expo.ios.buildNumber")"

      # EAS Build: builds the IPA in Expo's cloud (macOS workers managed by Expo).
      # --non-interactive: no prompts, suitable for CI.
      # --platform ios: iOS only (Android is handled by publish-play-store.yml).
      # --profile production: uses the "production" profile in eas.json (created below if missing).
      - name: Build IPA via EAS
        if: steps.check-apple.outputs.proceed == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
          APPLE_APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_API_KEY_ID }}
          APPLE_APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_APP_STORE_CONNECT_API_KEY: ${{ secrets.APPLE_APP_STORE_CONNECT_API_KEY }}
        run: |
          eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            --no-wait \
            --json \
            | tee eas-build-output.json
          BUILD_ID=$(cat eas-build-output.json | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).id)")
          echo "EAS_BUILD_ID=$BUILD_ID" >> $GITHUB_ENV
          echo "Build ID: $BUILD_ID"

      # Wait for the EAS build to complete (iOS builds typically take 15–25 minutes).
      - name: Wait for EAS build
        if: steps.check-apple.outputs.proceed == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          echo "Waiting for build $EAS_BUILD_ID to complete..."
          eas build:view "$EAS_BUILD_ID" --json --wait
          echo "Build complete."

      # Submit to TestFlight via EAS Submit. Uses the same App Store Connect API key.
      # --latest: picks the most recent finished build for this app + platform.
      - name: Submit to TestFlight via EAS Submit
        if: steps.check-apple.outputs.proceed == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
          APPLE_APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_API_KEY_ID }}
          APPLE_APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_APP_STORE_CONNECT_API_KEY: ${{ secrets.APPLE_APP_STORE_CONNECT_API_KEY }}
        run: |
          eas submit \
            --platform ios \
            --id "$EAS_BUILD_ID" \
            --non-interactive

      # Upload release notes to TestFlight (what's new text for testers).
      # NOTE: EAS Submit does not yet support whatsNew natively; use fastlane pilot
      # or App Store Connect API directly if per-build release notes are needed.
      - name: Upload TestFlight release notes (informational)
        if: steps.check-apple.outputs.proceed == 'true'
        run: |
          echo "TestFlight release notes for this build:"
          cat distribution/whatsnew-ios/release-notes-en-US.txt

